name: Final Chinese code comment cleanup

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Remove Chinese comments and validate syntax
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import ast
          import io
          import re
          import tokenize
          from pathlib import Path

          ROOT = Path.cwd()
          CJK = re.compile(r"[\u3400-\u4dbf\u4e00-\u9fff\uf900-\ufaff]")
          EXCLUDED_PARTS = {".git", "artifacts", "__pycache__"}


          def contains_cjk(text: str) -> bool:
              return bool(CJK.search(text))


          def line_offsets(text: str) -> list[int]:
              offsets = [0]
              for line in text.splitlines(keepends=True):
                  offsets.append(offsets[-1] + len(line))
              return offsets


          def docstring_replacements(text: str) -> list[tuple[int, int, str]]:
              tree = ast.parse(text)
              lines = text.splitlines(keepends=True)
              offsets = line_offsets(text)
              replacements: list[tuple[int, int, str]] = []
              owners = (ast.Module, ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef)
              for owner in ast.walk(tree):
                  if not isinstance(owner, owners):
                      continue
                  body = getattr(owner, "body", None)
                  if not body:
                      continue
                  first = body[0]
                  if not (
                      isinstance(first, ast.Expr)
                      and isinstance(first.value, ast.Constant)
                      and isinstance(first.value.value, str)
                      and contains_cjk(first.value.value)
                  ):
                      continue
                  start_line = first.lineno - 1
                  end_line = first.end_lineno or first.lineno
                  start = offsets[start_line]
                  end = offsets[end_line] if end_line < len(offsets) else len(text)
                  indent = re.match(r"[ \t]*", lines[start_line]).group(0)
                  newline = "\n" if lines[end_line - 1].endswith("\n") else ""
                  replacements.append((start, end, indent + '""""""' + newline))
              return replacements


          def python_comment_replacements(text: str) -> list[tuple[int, int, str]]:
              offsets = line_offsets(text)
              replacements: list[tuple[int, int, str]] = []
              for token in tokenize.generate_tokens(io.StringIO(text).readline):
                  if token.type != tokenize.COMMENT or not contains_cjk(token.string):
                      continue
                  start = offsets[token.start[0] - 1] + token.start[1]
                  end = offsets[token.end[0] - 1] + token.end[1]
                  replacements.append((start, end, ""))
              return replacements


          def apply_replacements(text: str, replacements: list[tuple[int, int, str]]) -> str:
              ordered = sorted(replacements, key=lambda item: (item[0], item[1]))
              merged: list[tuple[int, int, str]] = []
              for item in ordered:
                  if merged and item[0] < merged[-1][1]:
                      continue
                  merged.append(item)
              for start, end, replacement in reversed(merged):
                  text = text[:start] + replacement + text[end:]
              return text


          def clean_python(path: Path) -> bool:
              original = path.read_text(encoding="utf-8")
              replacements = docstring_replacements(original) + python_comment_replacements(original)
              if not replacements:
                  return False
              cleaned = apply_replacements(original, replacements)
              ast.parse(cleaned)
              path.write_text(cleaned, encoding="utf-8")
              return cleaned != original


          def shell_comment_index(line: str) -> int | None:
              single = False
              double = False
              escaped = False
              for index, char in enumerate(line):
                  if escaped:
                      escaped = False
                      continue
                  if char == "\\" and not single:
                      escaped = True
                      continue
                  if char == "'" and not double:
                      single = not single
                      continue
                  if char == '"' and not single:
                      double = not double
                      continue
                  if char != "#" or single or double:
                      continue
                  if index == 0 or line[index - 1].isspace() or line[index - 1] in ";|&()":
                      return index
              return None


          def clean_shell(path: Path) -> bool:
              original = path.read_text(encoding="utf-8")
              output: list[str] = []
              changed = False
              for number, line in enumerate(original.splitlines(keepends=True), start=1):
                  if number == 1 and line.startswith("#!"):
                      output.append(line)
                      continue
                  index = shell_comment_index(line)
                  if index is None or not contains_cjk(line[index:]):
                      output.append(line)
                      continue
                  newline = "\n" if line.endswith("\n") else ""
                  output.append(line[:index] + newline)
                  changed = True
              cleaned = "".join(output)
              if changed:
                  path.write_text(cleaned, encoding="utf-8")
              return changed


          def find_remaining_python_comments(path: Path) -> list[str]:
              text = path.read_text(encoding="utf-8")
              remaining: list[str] = []
              tree = ast.parse(text)
              owners = (ast.Module, ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef)
              for owner in ast.walk(tree):
                  if not isinstance(owner, owners):
                      continue
                  body = getattr(owner, "body", None)
                  if not body:
                      continue
                  first = body[0]
                  if (
                      isinstance(first, ast.Expr)
                      and isinstance(first.value, ast.Constant)
                      and isinstance(first.value.value, str)
                      and contains_cjk(first.value.value)
                  ):
                      remaining.append(f"docstring at line {first.lineno}")
              for token in tokenize.generate_tokens(io.StringIO(text).readline):
                  if token.type == tokenize.COMMENT and contains_cjk(token.string):
                      remaining.append(f"comment at line {token.start[0]}")
              return remaining


          code_files = sorted(
              path
              for path in ROOT.rglob("*")
              if path.is_file()
              and path.suffix in {".py", ".sh"}
              and not any(part in EXCLUDED_PARTS for part in path.parts)
          )

          changed_files: list[str] = []
          for path in code_files:
              changed = clean_python(path) if path.suffix == ".py" else clean_shell(path)
              if changed:
                  changed_files.append(path.relative_to(ROOT).as_posix())

          failures: list[str] = []
          for path in code_files:
              if path.suffix == ".py":
                  for item in find_remaining_python_comments(path):
                      failures.append(f"{path.relative_to(ROOT)}: {item}")
              else:
                  for number, line in enumerate(path.read_text(encoding="utf-8").splitlines(), start=1):
                      if number == 1 and line.startswith("#!"):
                          continue
                      index = shell_comment_index(line)
                      if index is not None and contains_cjk(line[index:]):
                          failures.append(f"{path.relative_to(ROOT)}: comment at line {number}")

          if failures:
              raise SystemExit("Chinese comments remain:\n" + "\n".join(failures))

          print("Changed code files:")
          for path in changed_files:
              print(path)
          print(f"Total changed code files: {len(changed_files)}")
          PY

          rm -f .github/workflows/remove_chinese_comments.yml
          rm -f .github/workflows/remove_chinese_comments_pr.yml
          rm -f .github/workflows/remove_chinese_comments_final.yml

          python -m compileall -q gwn scripts
          while IFS= read -r script; do
            bash -n "${script}"
          done < <(find scripts -type f -name '*.sh' | sort)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove Chinese code comments"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
