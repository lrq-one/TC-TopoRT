name: static-checks

on:
  push:
    branches:
      - master
      - reproducibility-complete
  pull_request:

jobs:
  syntax-and-dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lightweight dry-run dependencies
        run: python -m pip install --upgrade pip numpy pandas

      - name: Run static checks
        run: bash scripts/tests/run_static_checks.sh
